services:
  spark-app:
    image: github-analytics:latest
    container_name: spark_jupyter_app
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    environment:
      - MART_DB=${MART_DB}
      - MART_DB_USERNAME=${MART_DB_USERNAME}
      - MART_DB_PASSWORD=${MART_DB_PASSWORD}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}

  postgres-db:
    image: postgres:15
    container_name: postgres_db
    ports:
      - "5432:5432"
    volumes:
      - ./docker/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
      - pgdata:/var/lib/postgresql/data
      - ./sql:/sql
    environment:
      - POSTGRES_USER=${ADMIN_DB_USERNAME}
      - POSTGRES_PASSWORD=${ADMIN_DB_PASSWORD}
      - POSTGRES_DB=${ADMIN_DB}
      - MART_DB=${MART_DB}
      - MART_DB_USERNAME=${MART_DB_USERNAME}
      - MART_DB_PASSWORD=${MART_DB_PASSWORD}
      - AIRFLOW_DB=${AIRFLOW_DB}
      - AIRFLOW_DB_USERNAME=${AIRFLOW_DB_USERNAME}
      - AIRFLOW_DB_PASSWORD=${AIRFLOW_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ADMIN_DB_USERNAME} -d ${ADMIN_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.7.2
    container_name: airflow_init
    command: ["db", "init"]
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USERNAME}:${AIRFLOW_DB_PASSWORD}@postgres-db:5432/${AIRFLOW_DB}
    depends_on:
      postgres-db:
          condition: service_healthy

  airflow-webserver:
    image: apache/airflow:2.7.2
    container_name: airflow_webserver
    command: ["webserver"]
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USERNAME}:${AIRFLOW_DB_PASSWORD}@postgres-db:5432/${AIRFLOW_DB}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - PYTHONPATH=/opt/airflow                     # added so dags can look for src
      - AIRFLOW__WEBSERVER__SECRET_KEY=6468946df503d907c25b61d8f9cf651b
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - /var/run/docker.sock:/var/run/docker.sock   # add this line
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    image: apache/airflow:2.7.2
    container_name: airflow_scheduler
    command: ["scheduler"]
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USERNAME}:${AIRFLOW_DB_PASSWORD}@postgres-db:5432/${AIRFLOW_DB}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - PYTHONPATH=/opt/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=6468946df503d907c25b61d8f9cf651b
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src       # added so dags can look for src
      - /var/run/docker.sock:/var/run/docker.sock   # something to do with bashoperator
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  pgdata:
